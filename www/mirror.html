<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mirror</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      touch-action: none;
    }

    #video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #canvas {
      display: none;
    }

    #exit-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 0.3s, background 0.2s;
      opacity: 0.7;
    }

    #exit-btn:hover, #exit-btn:active {
      opacity: 1;
      background: rgba(220, 50, 50, 0.7);
    }

    #status {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      padding: 8px 20px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 0.5s;
      opacity: 0;
      pointer-events: none;
    }

    #status.visible {
      opacity: 0.8;
    }

    #presence-indicator {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }

    #presence-indicator.detected {
      background: #4caf50;
    }

    #presence-indicator.absent {
      background: #f44336;
    }

    #error-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      text-align: center;
    }

    #error-overlay.visible {
      display: flex;
    }

    #error-overlay h2 {
      font-size: 24px;
      font-weight: 500;
    }

    #error-overlay p {
      font-size: 16px;
      color: #aaa;
      max-width: 400px;
      line-height: 1.5;
    }

    #error-overlay button {
      padding: 12px 32px;
      border-radius: 8px;
      border: none;
      background: #2196f3;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <button id="exit-btn" title="Exit Mirror">✕</button>

  <div id="presence-indicator"></div>
  <div id="status"></div>

  <div id="error-overlay">
    <h2 id="error-title">Camera Access Required</h2>
    <p id="error-message">Please allow camera access in your browser settings to use the mirror feature.</p>
    <button onclick="exitMirror()">Back to Dashboard</button>
  </div>

  <script>
    // ── Configuration ──────────────────────────────────────────
    const CONFIG = {
      inactivityTimeoutSec: 60,    // seconds without motion before auto-exit
      detectionIntervalMs: 1000,  // how often to run detection (ms)
      motionThreshold: 30,        // pixel diff threshold per channel (sum of RGB)
      motionPixelRatio: 0.01,     // fraction of changed pixels to count as "presence"
      dashboardPath: '/lovelace/0', // path to return to
    };

    // Read dashboard return URL from query param if provided
    const params = new URLSearchParams(window.location.search);
    if (params.has('dashboard')) {
      CONFIG.dashboardPath = params.get('dashboard');
    }

    // ── State ──────────────────────────────────────────────────
    let stream = null;
    let detectionInterval = null;
    let detectionRunning = false;
    let inactivityTimer = null;
    let secondsInactive = 0;
    let previousFrame = null;
    let fullyMotionWasEnabled = false;

    // ── Fully Kiosk Browser Integration ────────────────────────
    // Fully Kiosk uses the camera for its own motion detection.
    // We must disable it while the mirror is open to avoid conflicts,
    // then re-enable it when the mirror exits.
    function isFullyKiosk() {
      return typeof fully !== 'undefined' && typeof fully.getBooleanSetting === 'function';
    }

    function disableFullyMotionDetection() {
      if (!isFullyKiosk()) return;
      try {
        fullyMotionWasEnabled = fully.getBooleanSetting('motionDetection');
        if (fullyMotionWasEnabled) {
          fully.setBooleanSetting('motionDetection', false);
          console.log('Disabled Fully Kiosk motion detection for mirror');
        }
      } catch (e) {
        console.warn('Could not disable Fully Kiosk motion detection:', e);
      }
    }

    function restoreFullyMotionDetection() {
      if (!isFullyKiosk() || !fullyMotionWasEnabled) return;
      try {
        fully.setBooleanSetting('motionDetection', true);
        console.log('Re-enabled Fully Kiosk motion detection');
      } catch (e) {
        console.warn('Could not restore Fully Kiosk motion detection:', e);
      }
    }

    // ── DOM References ─────────────────────────────────────────
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const exitBtn = document.getElementById('exit-btn');
    const statusEl = document.getElementById('status');
    const presenceIndicator = document.getElementById('presence-indicator');
    const errorOverlay = document.getElementById('error-overlay');

    // ── Exit Function ──────────────────────────────────────────
    function exitMirror() {
      stopDetection();
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      restoreFullyMotionDetection();
      // Navigate back — handle being inside an iframe (panel_iframe)
      try {
        const target = window.top !== window.self ? window.top : window;
        if (target.history.length > 1) {
          target.history.back();
        } else {
          target.location.href = CONFIG.dashboardPath;
        }
      } catch (e) {
        window.location.href = CONFIG.dashboardPath;
      }
    }

    exitBtn.addEventListener('click', exitMirror);

    // ── Status Messages ────────────────────────────────────────
    function showStatus(msg, durationMs) {
      statusEl.textContent = msg;
      statusEl.classList.add('visible');
      if (durationMs) {
        setTimeout(() => statusEl.classList.remove('visible'), durationMs);
      }
    }

    // ── Camera Setup ───────────────────────────────────────────
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'user',
            width: { ideal: 1920 },
            height: { ideal: 1080 },
          },
          audio: false,
        });
        video.srcObject = stream;

        await video.play();

        showStatus('Mirror active', 2000);

        if (!detectionRunning) {
          startDetection();
        }
      } catch (err) {
        console.error('Camera access failed:', err);
        const errorTitle = document.getElementById('error-title');
        const errorMessage = document.getElementById('error-message');

        if (!window.isSecureContext) {
          errorTitle.textContent = 'HTTPS Required';
          errorMessage.textContent = 'Camera access requires a secure (HTTPS) connection. Please enable HTTPS on your Home Assistant server.';
        } else if (err.name === 'NotAllowedError') {
          errorMessage.textContent = 'Camera permission was denied. Please allow camera access in your browser settings.';
        } else if (err.name === 'NotFoundError') {
          errorMessage.textContent = 'No camera found on this device.';
        }
        errorOverlay.classList.add('visible');
      }
    }

    // ── Motion Detection Constants ──────────────────────────
    const MOTION_WIDTH = 160;
    const MOTION_HEIGHT = 120;

    // ── Detection Loop ─────────────────────────────────────────
    function startDetection() {
      detectionRunning = true;
      scheduleDetection();
    }

    function scheduleDetection() {
      detectionInterval = setTimeout(async () => {
        try {
          await runDetection();
        } catch (e) {
          console.warn('Detection cycle error:', e);
        }
        if (detectionRunning) {
          scheduleDetection();
        }
      }, CONFIG.detectionIntervalMs);
    }

    function stopDetection() {
      detectionRunning = false;
      if (detectionInterval) {
        clearTimeout(detectionInterval);
        detectionInterval = null;
      }
      if (inactivityTimer) {
        clearInterval(inactivityTimer);
        inactivityTimer = null;
      }
    }

    async function runDetection() {
      if (!video.videoWidth || !video.videoHeight) return;

      // If video is paused, try to resume without restarting the camera
      if (video.paused) {
        video.play().catch(() => {});
        return;
      }

      let presenceDetected = true;
      try {
        // createImageBitmap is async and does NOT block the video decoder pipeline
        // (unlike drawImage(video) which causes synchronous GPU readback and freezes)
        const bitmap = await createImageBitmap(video,
          0, 0, video.videoWidth, video.videoHeight,
          { resizeWidth: MOTION_WIDTH, resizeHeight: MOTION_HEIGHT }
        );
        canvas.width = MOTION_WIDTH;
        canvas.height = MOTION_HEIGHT;
        ctx.drawImage(bitmap, 0, 0);
        bitmap.close();

        const currentFrame = ctx.getImageData(0, 0, MOTION_WIDTH, MOTION_HEIGHT);

        if (!previousFrame) {
          previousFrame = currentFrame;
        } else {
          presenceDetected = compareFrames(previousFrame, currentFrame);
          previousFrame = currentFrame;
        }
      } catch (e) {
        // If bitmap capture fails, assume someone is present
        presenceDetected = true;
      }

      updatePresenceState(presenceDetected);
    }

    // ── Motion Comparison ────────────────────────────────────────
    function compareFrames(frame1, frame2) {
      const data1 = frame1.data;
      const data2 = frame2.data;
      const totalPixels = MOTION_WIDTH * MOTION_HEIGHT;
      let changedPixels = 0;

      for (let i = 0; i < data1.length; i += 4) {
        const diff = Math.abs(data1[i] - data2[i])
                   + Math.abs(data1[i + 1] - data2[i + 1])
                   + Math.abs(data1[i + 2] - data2[i + 2]);
        if (diff > CONFIG.motionThreshold * 3) {
          changedPixels++;
        }
      }

      return (changedPixels / totalPixels) > CONFIG.motionPixelRatio;
    }

    // ── Presence State Management ───────────────────────────────
    function updatePresenceState(detected) {
      if (detected) {
        secondsInactive = 0;
        presenceIndicator.className = 'detected';

        if (inactivityTimer) {
          clearInterval(inactivityTimer);
          inactivityTimer = null;
          statusEl.classList.remove('visible');
        }
      } else {
        presenceIndicator.className = 'absent';

        if (!inactivityTimer) {
          secondsInactive = 0;
          inactivityTimer = setInterval(() => {
            secondsInactive++;
            const remaining = CONFIG.inactivityTimeoutSec - secondsInactive;

            if (remaining <= 10 && remaining > 0) {
              showStatus(`No motion detected — closing in ${remaining}s`);
            }

            if (secondsInactive >= CONFIG.inactivityTimeoutSec) {
              clearInterval(inactivityTimer);
              inactivityTimer = null;
              showStatus('No motion detected — returning to dashboard');
              setTimeout(exitMirror, 1000);
            }
          }, 1000);
        }
      }
    }

    // ── Keep Screen Awake ──────────────────────────────────────
    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch (e) {
        // Wake lock not supported or failed — not critical
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        if (!wakeLock) requestWakeLock();
        // Ensure video resumes after tab becomes visible again
        if (video.paused && stream) {
          video.play().catch(() => {});
        }
      }
    });

    // ── Init ───────────────────────────────────────────────────
    disableFullyMotionDetection();
    requestWakeLock();
    startCamera();
  </script>
</body>
</html>
