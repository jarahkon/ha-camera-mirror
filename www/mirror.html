<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mirror</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      touch-action: none;
    }

    #video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
    }

    #canvas {
      display: none;
    }

    /* Exit button */
    #exit-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 0.3s, background 0.2s;
      opacity: 0.7;
    }

    #exit-btn:hover, #exit-btn:active {
      opacity: 1;
      background: rgba(220, 50, 50, 0.7);
    }

    /* Status indicator */
    #status {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      padding: 8px 20px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 0.5s;
      opacity: 0;
      pointer-events: none;
    }

    #status.visible {
      opacity: 0.8;
    }

    /* Face detection indicator */
    #face-indicator {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }

    #face-indicator.detected {
      background: #4caf50;
    }

    #face-indicator.no-face {
      background: #f44336;
    }

    /* Error overlay */
    #error-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      text-align: center;
    }

    #error-overlay.visible {
      display: flex;
    }

    #error-overlay h2 {
      font-size: 24px;
      font-weight: 500;
    }

    #error-overlay p {
      font-size: 16px;
      color: #aaa;
      max-width: 400px;
      line-height: 1.5;
    }

    #error-overlay button {
      padding: 12px 32px;
      border-radius: 8px;
      border: none;
      background: #2196f3;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <button id="exit-btn" title="Exit Mirror">✕</button>

  <div id="face-indicator"></div>
  <div id="status"></div>

  <div id="error-overlay">
    <h2>Camera Access Required</h2>
    <p>Please allow camera access in your browser settings to use the mirror feature.</p>
    <button onclick="exitMirror()">Back to Dashboard</button>
  </div>

  <script>
    // ── Configuration ──────────────────────────────────────────
    const CONFIG = {
      noFaceTimeoutSec: 60,       // seconds without a face before auto-exit
      detectionIntervalMs: 1000,  // how often to run face detection (ms)
      motionThreshold: 15,        // pixel difference threshold for motion fallback
      motionPixelRatio: 0.02,     // fraction of changed pixels to count as "presence"
      dashboardPath: '/lovelace/0', // path to return to
    };

    // Read dashboard return URL from query param if provided
    const params = new URLSearchParams(window.location.search);
    if (params.has('dashboard')) {
      CONFIG.dashboardPath = params.get('dashboard');
    }

    // ── State ──────────────────────────────────────────────────
    let stream = null;
    let faceDetector = null;
    let useFaceDetectorAPI = false;
    let detectionInterval = null;
    let noFaceTimer = null;
    let secondsWithoutFace = 0;
    let previousFrame = null;

    // ── DOM References ─────────────────────────────────────────
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const exitBtn = document.getElementById('exit-btn');
    const statusEl = document.getElementById('status');
    const faceIndicator = document.getElementById('face-indicator');
    const errorOverlay = document.getElementById('error-overlay');

    // ── Exit Function ──────────────────────────────────────────
    function exitMirror() {
      stopDetection();
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }

      // Try Fully Kiosk Browser API first
      if (typeof fully !== 'undefined' && typeof fully.loadStartUrl === 'function') {
        fully.loadStartUrl();
        return;
      }

      // Navigate to dashboard
      window.location.href = CONFIG.dashboardPath;
    }

    exitBtn.addEventListener('click', exitMirror);

    // ── Status Messages ────────────────────────────────────────
    function showStatus(msg, durationMs) {
      statusEl.textContent = msg;
      statusEl.classList.add('visible');
      if (durationMs) {
        setTimeout(() => statusEl.classList.remove('visible'), durationMs);
      }
    }

    // ── Camera Setup ───────────────────────────────────────────
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'user',
            width: { ideal: 1920 },
            height: { ideal: 1080 },
          },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();

        // Set canvas to match video dimensions
        video.addEventListener('loadedmetadata', () => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
        });

        showStatus('Mirror active', 2000);
        initFaceDetection();
      } catch (err) {
        console.error('Camera access failed:', err);
        errorOverlay.classList.add('visible');
      }
    }

    // ── Face Detection Setup ───────────────────────────────────
    async function initFaceDetection() {
      // Try native FaceDetector API (Chromium-based browsers)
      if (typeof FaceDetector !== 'undefined') {
        try {
          faceDetector = new FaceDetector({ fastMode: true, maxDetectedFaces: 1 });
          useFaceDetectorAPI = true;
          console.log('Using native FaceDetector API');
        } catch (e) {
          console.warn('FaceDetector init failed, falling back to motion detection');
        }
      }

      if (!useFaceDetectorAPI) {
        console.log('Using motion detection fallback');
      }

      startDetection();
    }

    // ── Detection Loop ─────────────────────────────────────────
    function startDetection() {
      detectionInterval = setInterval(runDetection, CONFIG.detectionIntervalMs);
    }

    function stopDetection() {
      if (detectionInterval) {
        clearInterval(detectionInterval);
        detectionInterval = null;
      }
      if (noFaceTimer) {
        clearInterval(noFaceTimer);
        noFaceTimer = null;
      }
    }

    async function runDetection() {
      if (!video.videoWidth || !video.videoHeight) return;

      let facePresent = false;

      if (useFaceDetectorAPI && faceDetector) {
        facePresent = await detectWithFaceAPI();
      } else {
        facePresent = detectWithMotion();
      }

      updateFaceState(facePresent);
    }

    // ── Native FaceDetector ────────────────────────────────────
    async function detectWithFaceAPI() {
      try {
        const faces = await faceDetector.detect(video);
        return faces.length > 0;
      } catch (e) {
        console.warn('FaceDetector.detect() failed:', e);
        // Fall back to motion detection for subsequent calls
        useFaceDetectorAPI = false;
        return true; // Assume face present on error
      }
    }

    // ── Motion Detection Fallback ──────────────────────────────
    function detectWithMotion() {
      // Sample at a lower resolution for performance
      const sampleWidth = 160;
      const sampleHeight = 120;
      canvas.width = sampleWidth;
      canvas.height = sampleHeight;

      ctx.drawImage(video, 0, 0, sampleWidth, sampleHeight);
      const currentFrame = ctx.getImageData(0, 0, sampleWidth, sampleHeight);

      if (!previousFrame) {
        previousFrame = currentFrame;
        return true; // Assume present on first frame
      }

      const data1 = previousFrame.data;
      const data2 = currentFrame.data;
      const totalPixels = sampleWidth * sampleHeight;
      let changedPixels = 0;

      for (let i = 0; i < data1.length; i += 4) {
        const diff = Math.abs(data1[i] - data2[i])
                   + Math.abs(data1[i + 1] - data2[i + 1])
                   + Math.abs(data1[i + 2] - data2[i + 2]);
        if (diff > CONFIG.motionThreshold * 3) {
          changedPixels++;
        }
      }

      previousFrame = currentFrame;
      return (changedPixels / totalPixels) > CONFIG.motionPixelRatio;
    }

    // ── Face State Management ──────────────────────────────────
    function updateFaceState(facePresent) {
      if (facePresent) {
        secondsWithoutFace = 0;
        faceIndicator.className = 'detected';

        // Clear no-face timer if running
        if (noFaceTimer) {
          clearInterval(noFaceTimer);
          noFaceTimer = null;
          statusEl.classList.remove('visible');
        }
      } else {
        faceIndicator.className = 'no-face';

        // Start countdown if not already running
        if (!noFaceTimer) {
          secondsWithoutFace = 0;
          noFaceTimer = setInterval(() => {
            secondsWithoutFace++;
            const remaining = CONFIG.noFaceTimeoutSec - secondsWithoutFace;

            if (remaining <= 10 && remaining > 0) {
              showStatus(`No face detected — closing in ${remaining}s`);
            }

            if (secondsWithoutFace >= CONFIG.noFaceTimeoutSec) {
              showStatus('No face detected — returning to dashboard');
              setTimeout(exitMirror, 1000);
            }
          }, 1000);
        }
      }
    }

    // ── Keep Screen Awake ──────────────────────────────────────
    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch (e) {
        // Wake lock not supported or failed — not critical
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && !wakeLock) {
        requestWakeLock();
      }
    });

    // ── Init ───────────────────────────────────────────────────
    requestWakeLock();
    startCamera();
  </script>
</body>
</html>
